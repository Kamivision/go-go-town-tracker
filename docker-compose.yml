# Development Environment
services:
  db:
    image: postgres:16
    container_name: gogotowndb-container
    env_file:
      - dev.env
    volumes:
      - gogotown_postgres_data:/var/lib/postgresql/data

  backend:
    build: ./server
    container_name: gogotownserver-container
    env_file:
      - dev.env
    command: sh -c "python manage.py migrate && gunicorn ggtown_api.wsgi --bind 0.0.0:8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    depends_on:
      - db

  frontend:
    build: ./client
    container_name: gogotownclient-container
    ports:
      - "80:80"
    volumes:
      - ./client/dist:/usr/share/nginx/html
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  gogotown_postgres_data: